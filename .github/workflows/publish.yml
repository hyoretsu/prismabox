name: Publish new version

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

jobs:
  tag:
    name: Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.version_tag.outputs.created }}
      version_tag: ${{ steps.version_tag.outputs.version_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Ensure version tag exists
        id: version_tag
        run: |
          VERSION=$(bun -p "require('./package.json').version")
          VERSION_TAG="v${VERSION}"

          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "created=false" >> $GITHUB_OUTPUT

          git fetch --tags

          if ! git rev-parse "${VERSION_TAG}" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${VERSION_TAG}"
            git push origin "${VERSION_TAG}"
            echo "created=true" >> $GITHUB_OUTPUT
            echo "Created and pushed ${VERSION_TAG}."
          fi

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [tag]
    if: needs.tag.outputs.created == 'true'
    permissions:
      contents: write
    steps:
      - name: Create release from new tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.tag.outputs.version_tag }}';
            const prerelease = tag.includes('-');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              prerelease,
              generate_release_notes: true,
            });

  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install npm
        run: bun add -g npm
      - name: Install dependencies
        run: NODE_ENV=development bun i
      - name: Build and publish
        run: bunx npm publish --provenance --access public
